---
# cPanel deployment configuration for houseofeunice
deployment:
  tasks:
    - echo "Starting deployment of houseofeunice..."
    - export DEPLOY_DIR="$HOME/public_html/houseofeunice"
    - echo "Deploying files to $DEPLOY_DIR..."
    - rsync -av --exclude='.git' ./ $DEPLOY_DIR/
    - echo "Deployment complete!"
